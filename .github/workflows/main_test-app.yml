name: Build and deploy Node.js app to Azure Web App - test-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install packages
        run: npm ci

      - name: Build
        run: npm run build

      # server.js가 있는 standalone 폴더 찾기
      - name: Find standalone app
        run: |
          APP_DIR=$(find . -type d -path "*/.next/standalone" | head -n 1)
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      # App Service에 올릴 배포 폴더 생성 및 물리 파일 복사
      - name: Prepare deploy package
        run: |
          mkdir deploy

          echo "1. standalone 코드 복사"
          cp -a .next/standalone/. deploy/

          echo "2. 깨지기 쉬운 standalone/node_modules 심볼릭 링크 삭제"
          rm -rf deploy/node_modules

          echo "3. 프로젝트 루트의 진짜 node_modules를 프로덕션용으로 정리 후 물리 파일 복사"
          npm prune --production
          cp -r node_modules deploy/

          echo "4. static 및 public 폴더 복사"
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/

          if [ -d public ]; then
            cp -a public deploy/
          fi

          echo "===== 배포용 폴더 구조 최종 확인 ====="
          ls -la deploy
          ls -la deploy/node_modules | head -10

      # [핵심] 배포 폴더를 zip 파일로 압축 (Azure의 불필요한 개입 차단)
      - name: Zip artifact for deployment
        run: |
          cd deploy
          zip -r ../release.zip .
          cd ..

      # 압축된 release.zip 파일을 아티팩트로 업로드
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 압축 파일 아티팩트 다운로드
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # Azure Web App에 Zip 패키지 형태로 안전하게 배포
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: test-app
          slot-name: staging
          publish-profile: ${{ secrets.APP_TEST_STAGING }}
          package: release.zip
