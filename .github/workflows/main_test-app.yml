name: Build and deploy Node.js app to Azure Web App - test-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install packages
        run: npm ci

      - name: Build
        run: npm run build

      - name: Show working directory
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Directory contents:"
          ls .next/standalone/ -la

      # server.js가 있는 standalone 폴더 찾기
      - name: Find standalone app
        run: |
          APP_DIR=$(find . -type d -path "*/.next/standalone" | head -n 1)

          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      # App Service에 올릴 폴더 생성
      # App Service에 올릴 폴더 생성
      - name: Prepare deploy package
        run: |
          mkdir deploy

          echo "1. standalone 코드 복사"
          # 소스코드를 먼저 복사합니다.
          cp -a .next/standalone/. deploy/

          echo "2. 깨지기 쉬운 standalone/node_modules 삭제"
          # Next.js가 만든 문제의 심볼릭 링크 node_modules를 강제로 지웁니다.
          rm -rf deploy/node_modules

          echo "3. 프로젝트 루트의 '진짜' node_modules를 프로덕션용으로만 재설치하여 복사"
          # 빌드 서버 루트에서 프로덕션 의존성만 골라 deploy 폴더에 물리적 파일로 설치합니다.
          # (또는 안전하게 cp -r node_modules deploy/ 로 통째 복사해도 됩니다.)
          npm prune --production
          cp -r node_modules deploy/

          echo "4. static 및 public 복사"
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/

          if [ -d public ]; then
            cp -a public deploy/
          fi

          echo "===== 최종 배포 폴더 구조 확인 ====="
          ls -la deploy
          ls -la deploy/node_modules | head -10
      # 확인용 (처음 한두 번만 사용)
      - name: Show deploy structure
        run: |
          echo "===== deploy ====="
          find deploy

      - name: Inspect standalone
        run: |
          echo "=== standalone ==="
          ls -l .next/standalone
          echo ""
          echo "===== standalone/node_modules ====="
          ls -ld .next/standalone/node_modules
          ls -l .next/standalone/node_modules | head -20
          echo "=== deploy ==="
          ls -l deploy
          echo "=== deploy/node_modules ==="
          ls -l deploy/node_modules
          ls -l .next/standalone/node_modules | head -20
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Inspect downloaded artifact
        run: |
          pwd
          echo "===== deploy ====="
          ls -la deploy
          echo "===== deploy/node_modules ====="
          ls -ld deploy/node_modules
          ls -l deploy/node_modules | head -2
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        env:
          SCM_DO_BUILD_DURING_DEPLOYMENT: 'false'
        with:
          app-name: test-app
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8238FDE204954D1B9EBB0A1EFF2452DB }}
          package: deploy
