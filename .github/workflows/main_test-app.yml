name: Build and deploy Node.js app to Azure Web App - test-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install packages
        run: npm ci

      - name: Build
        run: npm run build

      # server.js가 있는 standalone 폴더 찾기
      - name: Find standalone app
        run: |
          APP_DIR=$(dirname "$(find .next/standalone -name server.js | head -1)")
          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      # App Service에 올릴 폴더 생성
      - name: Prepare deploy package
        run: |
          mkdir deploy

          # standalone 내용 복사
          cp -a "$APP_DIR"/. deploy/

          # static 복사
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/

          # public 복사
          if [ -d public ]; then
            cp -a public deploy/
          fi

      # 확인용 (처음 한두 번만 사용)
      - name: Show deploy structure
        run: |
          echo "===== deploy ====="
          find deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: test-app
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8238FDE204954D1B9EBB0A1EFF2452DB }}
          package: .
