name: Build and deploy Node.js app to Azure Web App - test-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install packages
        run: npm ci

      - name: Build
        run: npm run build

      - name: Show working directory
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Directory contents:"
          ls .next/standalone/ -la

      # server.js가 있는 standalone 폴더 찾기
      - name: Find standalone app
        run: |
          APP_DIR=$(find . -type d -path "*/.next/standalone" | head -n 1)

          echo "APP_DIR=$APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV

      # App Service에 올릴 폴더 생성
      # App Service에 올릴 폴더 생성
      - name: Prepare deploy package
        run: |
          mkdir deploy

          echo "standalone 내용 복사 (심볼릭 링크 해제하여 실제 파일로 복사)"
          # -L 옵션을 주어 심볼릭 링크가 아닌 실제 디렉토리/파일로 복사합니다.
          cp -rL "$APP_DIR"/. deploy/

          echo "static 복사"
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/

          echo "public 복사"
          if [ -d public ]; then
            cp -a public deploy/
          fi

          ls -la deploy
      # 확인용 (처음 한두 번만 사용)
      - name: Show deploy structure
        run: |
          echo "===== deploy ====="
          find deploy

      - name: Inspect standalone
        run: |
          echo "=== standalone ==="
          ls -l .next/standalone
          echo ""
          echo "===== standalone/node_modules ====="
          ls -ld .next/standalone/node_modules
          ls -l .next/standalone/node_modules | head -20
          echo "=== deploy ==="
          ls -l deploy
          echo "=== deploy/node_modules ==="
          ls -l deploy/node_modules
          ls -l .next/standalone/node_modules | head -20
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Inspect downloaded artifact
        run: |
          pwd
          echo "===== deploy ====="
          ls -la deploy
          echo "===== deploy/node_modules ====="
          ls -ld deploy/node_modules
          ls -l deploy/node_modules | head -2
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: test-app
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8238FDE204954D1B9EBB0A1EFF2452DB }}
          package: deploy
